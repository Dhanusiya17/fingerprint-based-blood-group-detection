version: "3.9"
services:
  api:
    build: .
    image: fingerprint-bloodgroup-api:latest
    container_name: fingerprint-api
    ports:
      - "8000:8000"
    environment:
      - DATA_ROOT=/data/dataset_blood_group
      - MODELS_DIR=/app/app/storage/models
    volumes:
      - ../dataset:/data:ro
      - ./app/storage:/app/app/storage
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]